<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vote Status</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Reset and base */
        * { box-sizing: border-box; }
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', Arial, sans-serif;
            background: linear-gradient(135deg, #eef2ff 0%, #e6f7fb 100%);
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 16px;
        }

        .container {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            max-width: 400px;
            width: 90%;
            padding: 34px 26px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 18px 45px rgba(31, 42, 68, 0.15);
            box-sizing: border-box;
        }

        h2 {
            font-size: 24px;
            margin-bottom: 25px;
            color: #1f2a44;
            min-height: 48px;
            font-weight: 600;
        }

        .message {
            background-color: #d4edda;
            color: #155724;
            border-radius: 10px;
            padding: 15px;
            font-weight: 600;
            margin-bottom: 25px;
            border: 1px solid #c3e6cb;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
            border-radius: 10px;
            padding: 15px;
            font-weight: 600;
            margin-bottom: 25px;
            border: 1px solid #f5c6cb;
        }

        a.button,
        button.button {
            display: inline-block;
            background: linear-gradient(135deg, #6d5efc, #00d4ff);
            color: white;
            text-decoration: none;
            padding: 12px 26px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            font-family: inherit;
            transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 8px 20px rgba(109, 94, 252, 0.35);
        }

        a.button:hover,
        a.button:focus,
        button.button:hover,
        button.button:focus {
            transform: translateY(-2px);
            filter: brightness(1.06);
            box-shadow: 0 12px 26px rgba(0, 212, 255, 0.45);
            outline: none;
        }

        @media (max-width: 480px) {
            .container {
                padding: 22px 16px;
            }
            h2 {
                font-size: 20px;
                min-height: auto;
            }
            a.button {
                font-size: 14px;
                padding: 10px 20px;
                width: 100%;
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div th:if="${message}" class="message" th:text="${message}">Message goes here</div>
    <div th:if="${error}" class="error" th:text="${error}">Error goes here</div>
    <form th:action="@{/voter/exit}" method="post" style="margin:0;">
        <button type="submit" class="button">Go back to Login</button>
    </form>
</div>

</body>
</html>
