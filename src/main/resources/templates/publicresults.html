<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Election Results</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Poppins', Arial, sans-serif;
            background: linear-gradient(135deg, #eef2ff 0%, #e6f7fb 100%);
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        h2 {
            color: #1f2a44;
            text-align: center;
            margin-bottom: 24px;
            font-weight: 600;
        }

        table {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            width: 100%;
            max-width: 800px;
            border-collapse: collapse;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 12px 30px rgba(31, 42, 68, 0.10);
            margin: 0 auto;
        }

        th, td {
            border: 1px solid #e6e9f0;
            padding: 12px;
            text-align: left;
        }

        th {
            background: linear-gradient(135deg, #6d5efc, #00d4ff);
            color: white;
            font-weight: 600;
        }

        .message {
            background: #fff8e1;
            border: 1px solid #ffc107;
            padding: 15px;
            color: #856404;
            margin: 0 auto 24px;
            max-width: 800px;
            border-radius: 12px;
            text-align: center;
        }

        @media (max-width: 600px) {
            th, td {
                padding: 8px;
                font-size: 14px;
            }
            h2 { font-size: 24px; }
            .message { font-size: 14px; }
        }
    </style>
</head>
<body>

<h2>Election Results</h2>

<div th:if="${message}" class="message" th:text="${message}"></div>

<table th:if="${candidates}">
    <thead>
        <tr>
            <th>Candidate Name</th>
            <th>Party</th>
            <th>Votes</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="candidate : ${candidates}">
            <td th:text="${candidate.candidateName}"></td>
            <td th:text="${candidate.partyName}"></td>
            <td th:text="${candidate.voteCount}"></td>
        </tr>
    </tbody>
</table>

</body>
</html>
