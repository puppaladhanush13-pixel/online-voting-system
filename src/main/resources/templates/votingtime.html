<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Voting Time</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Poppins', Arial, sans-serif;
            background: linear-gradient(135deg, #eef2ff 0%, #e6f7fb 100%);
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        h2 {
            color: #1f2a44;
            margin-bottom: 20px;
            border-bottom: 2px solid #6d5efc;
            padding-bottom: 10px;
            font-weight: 600;
        }

        form {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.6);
            padding: 22px;
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(31, 42, 68, 0.10);
            margin-bottom: 20px;
            max-width: 560px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }

        input[type="datetime-local"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #d6e4ff;
            border-radius: 10px;
            font-family: inherit;
            box-sizing: border-box;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input[type="datetime-local"]:focus {
            border-color: #6d5efc;
            box-shadow: 0 0 0 4px rgba(109, 94, 252, 0.15);
            outline: none;
        }

        button {
            background: linear-gradient(135deg, #6d5efc, #00d4ff);
            color: white;
            border: none;
            cursor: pointer;
            padding: 12px 18px;
            border-radius: 10px;
            transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
            font-size: 16px;
            font-weight: 500;
            font-family: inherit;
            box-shadow: 0 8px 20px rgba(109, 94, 252, 0.35);
        }

        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.06);
            box-shadow: 0 12px 26px rgba(0, 212, 255, 0.45);
        }

        .back-button {
            text-align: center;
            margin-top: 30px;
        }

        .back-button a {
            background: linear-gradient(135deg, #6d5efc, #00d4ff);
            color: white;
            padding: 12px 18px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            display: inline-block;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            box-shadow: 0 8px 20px rgba(109, 94, 252, 0.35);
        }

        .back-button a:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 26px rgba(0, 212, 255, 0.45);
        }

        .info-box {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.6);
            padding: 22px;
            border-radius: 16px;
            margin-top: 30px;
            max-width: 560px;
            box-shadow: 0 12px 30px rgba(31, 42, 68, 0.10);
        }

        @media (max-width: 768px) {
            form {
                padding: 15px;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <h2>Set Voting Period</h2>

    <form th:action="@{/admin/votingtime}" th:object="${config}" method="post">
        <label for="startTime">Start Time:</label>
        <input type="datetime-local" id="startTime" th:field="*{startTime}" required />

        <label for="endTime">End Time:</label>
        <input type="datetime-local" id="endTime" th:field="*{endTime}" required />

        <button type="submit">Save</button>
    </form>

    <form th:action="@{/admin/votingtime/delete}" method="post" style="margin-top: 15px;">
        <button type="submit">Delete Voting Time</button>
    </form>

    <div class="info-box" th:if="${config != null and config.startTime != null and config.endTime != null}">
        <h3>Current Voting Schedule</h3>
        <p><strong>Start Time:</strong> <span th:text="${#temporals.format(config.startTime, 'yyyy-MM-dd HH:mm')}">Not set</span></p>
        <p><strong>End Time:</strong> <span th:text="${#temporals.format(config.endTime, 'yyyy-MM-dd HH:mm')}">Not set</span></p>
    </div>

    <div class="back-button">
        <a th:href="@{/admin/dashboard}">Back to Dashboard</a>
    </div>
</body>
</html>
