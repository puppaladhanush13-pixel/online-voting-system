<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Poppins', 'Arial', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a8f, #2196F3);
            background-size: 300% 300%;
            animation: gradientShift 14s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 40px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.28);
            width: 90%;
            max-width: 350px;
            text-align: center;
            transition: transform 0.3s ease;
        }
        .container:hover {
            transform: translateY(-4px);
        }
        h2 {
            margin-bottom: 20px;
            color: #1565C0;
            font-weight: 600;
        }
        input[type=text], input[type=password] {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #d6e4ff;
            border-radius: 10px;
            transition: border-color 0.3s, box-shadow 0.3s;
            font-size: 16px;
            font-family: inherit;
            box-sizing: border-box;
        }
        input[type=text]:focus, input[type=password]:focus {
            border-color: #1976D2;
            box-shadow: 0 0 0 4px rgba(25, 118, 210, 0.15);
            outline: none;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #1976D2, #00d4ff);
            border: none;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            font-family: inherit;
            transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
            margin-top: 10px;
            box-shadow: 0 8px 20px rgba(25, 118, 210, 0.4);
        }
        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.08);
            box-shadow: 0 12px 26px rgba(0, 212, 255, 0.45);
        }
        .error {
            color: #D32F2F;
            font-size: 14px;
            margin-top: 10px;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #555;
        }
        .icon {
            font-size: 40px;
            color: #1976D2;
            margin-bottom: 10px;
        }
        @media (max-width: 600px) {
            h2 { font-size: 24px; }
            .container { padding: 30px; }
            button { font-size: 14px; }
            input[type=text], input[type=password] { font-size: 14px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h2><i class="fas fa-user-lock icon"></i> Admin Login</h2>
    <form method="post" action="/admin/login">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
        <div class="error" th:if="${error}" th:text="${error}"></div>
    </form>
    <div class="footer">© 2025 All Rights Reserved</div>
</div>
</body>
</html>
