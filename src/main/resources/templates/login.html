<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voter Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Poppins', Arial, sans-serif;
            background: url("/images/9176947.jpg") no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, rgba(15,32,39,0.55), rgba(33,87,180,0.45));
            z-index: 0;
        }
        .container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 40px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        h2 {
            margin-bottom: 20px;
            color: #1976d2;
            font-weight: 600;
        }
        input[type=text], input[type=password] {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #d6e4ff;
            border-radius: 10px;
            transition: border-color 0.3s, box-shadow 0.3s;
            font-size: 16px;
            font-family: inherit;
            box-sizing: border-box;
        }
        input[type=text]:focus, input[type=password]:focus {
            border-color: #1976d2;
            box-shadow: 0 0 0 4px rgba(25, 118, 210, 0.15);
            outline: none;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            border: none;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 500;
            font-family: inherit;
            transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
            margin-top: 10px;
            box-shadow: 0 8px 20px rgba(17, 153, 142, 0.4);
        }
        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.06);
            box-shadow: 0 12px 26px rgba(56, 239, 125, 0.45);
        }
        .register-link {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
        }
        .register-link a {
            color: #1976d2;
            text-decoration: none;
            font-weight: 500;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
        .error {
            color: #d32f2f;
            font-size: 14px;
            margin-top: 10px;
        }

        /* Status banners */
        .banner {
            margin-bottom: 14px;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            text-align: left;
            line-height: 1.4;
        }
        .banner-pending {
            background: #fff8e1;
            border: 1px solid #ffca28;
            color: #8a6d00;
        }
        .banner-rejected {
            background: #fdecea;
            border: 1px solid #ef5350;
            color: #b71c1c;
        }

        /* Success modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 20, 30, 0.55);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-card {
            background: #fff;
            border-radius: 18px;
            padding: 30px 26px;
            max-width: 360px;
            width: 90%;
            text-align: center;
            box-shadow: 0 24px 60px rgba(0,0,0,0.35);
            animation: popIn 0.35s ease;
        }
        .modal-card .check {
            width: 64px;
            height: 64px;
            margin: 0 auto 14px;
            border-radius: 50%;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: #fff;
            font-size: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 24px rgba(17, 153, 142, 0.45);
        }
        .modal-card h3 { margin: 0 0 10px; color: #1f2a44; font-weight: 600; }
        .modal-card p { margin: 0 0 20px; color: #555; font-size: 14px; line-height: 1.5; }
        .modal-card button {
            width: auto;
            padding: 11px 28px;
        }
    </style>
</head>
<body>
<div class="container">
    <h2><i class="fas fa-user-check"></i> Voter Login</h2>

    <div class="banner banner-pending" th:if="${pending}" th:text="${pending}"></div>
    <div class="banner banner-rejected" th:if="${rejected}" th:text="${rejected}"></div>

    <form method="post" action="/voter/login">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
        <div class="register-link">
          Don't have an account? <a href="/voter/register"> Register</a>
        </div>
        <div class="error" th:if="${error}" th:text="${error}"></div>
    </form>
</div>

<!-- Registration success popup -->
<div class="modal-overlay" id="successModal" th:if="${registered}" style="display:flex;">
    <div class="modal-card">
        <div class="check">&#10003;</div>
        <h3>Registration Successful</h3>
        <p th:text="${registered}">Your account is pending admin approval.</p>
        <button type="button" onclick="document.getElementById('successModal').style.display='none'">Got it</button>
    </div>
</div>
</body>
</html>
