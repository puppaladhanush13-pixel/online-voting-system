<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voter Registration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            background: url('/images/5362176.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Poppins', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, rgba(0,77,64,0.5), rgba(15,32,39,0.55));
            z-index: 0;
        }
        .container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 30px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 18px 45px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        h2 {
            color: #00796b;
            margin-bottom: 20px;
            font-weight: 600;
        }
        input[type=text], input[type=password] {
            width: 100%;
            padding: 13px;
            margin: 10px 0;
            border: 2px solid #cfe8e3;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            box-sizing: border-box;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        input[type=text]:focus, input[type=password]:focus {
            border-color: #00796b;
            box-shadow: 0 0 0 4px rgba(0, 121, 107, 0.15);
            outline: none;
        }
        button {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #00796b, #16c79a);
            border: none;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            font-family: inherit;
            transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
            box-shadow: 0 8px 20px rgba(0, 121, 107, 0.4);
        }
        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.07);
            box-shadow: 0 12px 26px rgba(22, 199, 154, 0.45);
        }
        .error {
            color: #d32f2f;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }
        .error.visible {
            display: block;
        }
        .login-link {
            margin-top: 15px;
            font-size: 14px;
        }
        .login-link a {
            color: #00796b;
            text-decoration: none;
            font-weight: 500;
        }
        .login-link a:hover {
            text-decoration: underline;
        }

        /* Aadhaar upload section */
        .upload-label {
            display: block;
            text-align: left;
            margin: 14px 0 6px;
            font-size: 14px;
            font-weight: 600;
            color: #00695c;
        }
        .upload-box {
            position: relative;
            border: 2px dashed #16c79a;
            border-radius: 12px;
            padding: 18px;
            background: rgba(22, 199, 154, 0.06);
            cursor: pointer;
            transition: background 0.25s, border-color 0.25s;
        }
        .upload-box:hover {
            background: rgba(22, 199, 154, 0.12);
            border-color: #00796b;
        }
        .upload-box input[type=file] {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        .upload-inner {
            pointer-events: none;
            color: #00695c;
        }
        .upload-inner .up-icon { font-size: 30px; }
        .upload-inner .up-text { font-size: 13px; margin-top: 6px; }
        .upload-inner .up-hint { font-size: 11px; color: #4f7d76; margin-top: 2px; }
        .preview-wrap { margin-top: 12px; display: none; }
        .preview-wrap img {
            max-width: 100%;
            max-height: 160px;
            border-radius: 10px;
            border: 1px solid #cfe8e3;
            box-shadow: 0 6px 16px rgba(0,0,0,0.15);
        }
        .file-name {
            font-size: 12px;
            color: #00695c;
            margin-top: 6px;
            word-break: break-all;
        }

        @media (max-width: 600px) {
            h2 { font-size: 24px; }
            .container { padding: 20px; }
            button { font-size: 14px; }
            input[type=text], input[type=password] { font-size: 14px; }
        }

        /* Important credentials warning note */
        .note-box {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            text-align: left;
            margin: 14px 0 4px;
            padding: 12px 14px;
            font-size: 13px;
            line-height: 1.45;
            color: #b71c1c;
            background: linear-gradient(135deg, rgba(255, 82, 82, 0.10), rgba(244, 67, 54, 0.06));
            border: 1px solid #ef9a9a;
            border-left: 4px solid #e53935;
            border-radius: 10px;
            box-shadow: 0 4px 14px rgba(229, 57, 53, 0.12);
        }
        .note-box .note-icon {
            font-size: 18px;
            line-height: 1.3;
            flex-shrink: 0;
        }
        .note-box b { color: #c62828; }
    </style>
</head>
<body>
<div class="container">
    <h2>Register as Voter</h2>
    <form method="post" action="/voter/register" enctype="multipart/form-data" id="registerForm">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <div class="note-box" role="alert">
            <span class="note-icon">&#9888;</span>
            <span><b>Note:</b> User ID and Password cannot be reset, updated, recovered, or retrieved if forgotten. Please remember your credentials carefully.</span>
        </div>

        <span class="upload-label">Upload Aadhaar Card Image Clearly</span>
        <div class="upload-box">
            <input type="file" name="aadhaarImage" id="aadhaarInput"
                   accept=".jpg,.jpeg,.png,image/jpeg,image/png" required>
            <div class="upload-inner">
                <div class="up-icon">&#128228;</div>
                <div class="up-text">Click or drag your Aadhaar image here</div>
                <div class="up-hint">Allowed: JPG, JPEG, PNG</div>
            </div>
        </div>
        <div class="preview-wrap" id="previewWrap">
            <img id="previewImg" alt="Aadhaar preview" />
            <div class="file-name" id="fileName"></div>
        </div>

        <button type="submit" style="margin-top:16px;">Register</button>
        <div class="error" id="error-message">[[${error}]]</div>
    </form>
    <div class="login-link">
        Already have an account? <a href="/voter/login">Login</a>
    </div>
</div>

<script>
    const errorMessage = document.getElementById('error-message');
    if (errorMessage.textContent.trim() !== '') {
        errorMessage.classList.add('visible');
    }

    const allowed = ['image/jpeg', 'image/jpg', 'image/png'];
    const input = document.getElementById('aadhaarInput');
    const previewWrap = document.getElementById('previewWrap');
    const previewImg = document.getElementById('previewImg');
    const fileName = document.getElementById('fileName');
    const form = document.getElementById('registerForm');

    function showError(msg) {
        errorMessage.textContent = msg;
        errorMessage.classList.add('visible');
    }

    input.addEventListener('change', function () {
        errorMessage.classList.remove('visible');
        const file = this.files && this.files[0];
        if (!file) { previewWrap.style.display = 'none'; return; }

        const nameOk = /\.(jpg|jpeg|png)$/i.test(file.name);
        const typeOk = allowed.includes((file.type || '').toLowerCase());
        if (!nameOk || !typeOk) {
            this.value = '';
            previewWrap.style.display = 'none';
            showError('Only JPG, JPEG or PNG image files are allowed.');
            return;
        }

        const reader = new FileReader();
        reader.onload = e => {
            previewImg.src = e.target.result;
            fileName.textContent = file.name;
            previewWrap.style.display = 'block';
        };
        reader.readAsDataURL(file);
    });

    form.addEventListener('submit', function (e) {
        const file = input.files && input.files[0];
        if (!file) {
            e.preventDefault();
            showError('Please upload your Aadhaar card image.');
        }
    });
</script>
</body>
</html>
