<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registered Voters</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Poppins', Arial, sans-serif;
            background: linear-gradient(135deg, #eef2ff 0%, #e6f7fb 100%);
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        h2 {
            color: #1f2a44;
            text-align: center;
            margin-bottom: 24px;
            font-weight: 600;
        }

        table {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            width: 100%;
            max-width: 800px;
            border-collapse: collapse;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 12px 30px rgba(31, 42, 68, 0.10);
            margin: 0 auto;
        }

        th, td {
            border: 1px solid #e6e9f0;
            padding: 12px;
            text-align: left;
        }

        th {
            background: linear-gradient(135deg, #6d5efc, #00d4ff);
            color: white;
            font-weight: 600;
        }

        .btn {
            background: linear-gradient(135deg, #6d5efc, #00d4ff);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            margin-bottom: 20px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            font-weight: 500;
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
            box-shadow: 0 6px 16px rgba(109, 94, 252, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.06);
            box-shadow: 0 10px 22px rgba(0, 212, 255, 0.4);
        }

        @media (max-width: 600px) {
            .btn {
                padding: 8px 15px;
                font-size: 14px;
            }

            th, td {
                padding: 8px;
                font-size: 14px;
            }

            h2 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

<a href="/admin/dashboard" class="btn">← Back to Dashboard</a>

<h2>Voter List</h2>

<table>
    <tr>
        <th>Username</th>
        <th>Status</th>
    </tr>
    <tr th:each="voter : ${voters}">
        <td th:text="${voter.username}"></td>
        <td th:text="${voter.hasVoted ? 'Voted' : 'Not Voted'}"></td>
    </tr>
</table>

</body>
</html>
