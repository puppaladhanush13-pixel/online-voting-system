spring.application.name=Online_voting_system

# ===== MySQL Datasource =====
# Values can be overridden with environment variables (DB_HOST, DB_PORT, DB_NAME, DB_USERNAME, DB_PASSWORD).
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:Online_voting_system}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:system@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

server.port=8000

# ===== File uploads =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===== Logging =====
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# ===== Thymeleaf =====
spring.thymeleaf.cache=false
